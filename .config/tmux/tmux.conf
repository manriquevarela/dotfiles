
# Enable 256 color support and true color
set -g default-terminal "tmux-256color"

# Allow true color (24-bit) if your terminal supports it
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse support (for pane resizing, window switching, etc.)
set -g mouse on

# Bind keys to copy Tmux buffer to Windows clipboard
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "/mnt/c/Users/mvarela/programs/win32yank-x64/win32yank.exe -i --crlf"
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "/mnt/c/Users/mvarela/programs/win32yank-x64/win32yank.exe -i --crlf"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "/mnt/c/Users/mvarela/programs/win32yank-x64/win32yank.exe -i --crlf"

# New panes start in the current pane's directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Optional: Vi-style key bindings
setw -g mode-keys vi

# Vim-style pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (prefix + HJKL)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vim-style window navigation (prefix + Ctrl+h/l)
bind -r C-h previous-window
bind -r C-l next-window

# Vim-style session navigation (prefix + Ctrl+j/k)
bind -r C-j switch-client -n
bind -r C-k switch-client -p

# FZF session switcher (prefix + s)
bind s display-popup -E -w 80% -h 80% "\
  tmux list-sessions -F '#{session_name}' | \
  fzf --reverse --header 'Switch to session:' --preview 'tmux capture-pane -ep -t {}' | \
  xargs tmux switch-client -t"

# FZF project switcher (prefix + f)
# Creates or switches to session based on directory name
bind f display-popup -E -w 80% -h 80% "\
  find ~/developer -mindepth 1 -maxdepth 3 -type d | \
  fzf --reverse --header 'Open project:' --preview 'eza --tree --level=2 --icons {}' | \
  xargs -I {} bash -c 'session=\$(basename {}); \
  tmux has-session -t \$session 2>/dev/null || tmux new-session -ds \$session -c {}; \
  tmux switch-client -t \$session'"

# Dim inactive panes (Catppuccin Mocha)
# Inactive: mantle (#181825) with dimmed subtext0 (#A6ADC8)
# Active: base (#1E1E2E) with text (#CDD6F4)
set -g window-style 'fg=#A6ADC8,bg=#181825'
set -g window-active-style 'fg=#CDD6F4,bg=#1E1E2E'

# Pane borders (Catppuccin Mocha)
# Inactive: surface1 (#45475A)
# Active: blue (#89B4FA)
set -g pane-border-style 'fg=#45475A'
set -g pane-active-border-style 'fg=#89B4FA,bold'

set -g status-position top # move status bar to top
set -g status-justify centre # center align window list

# Automatically rename window to git repo name if in a repo, else fallback to directory
set-option -g automatic-rename off
set-option -g allow-rename off

# Catppuccin Mocha status line (true colors)
set -g status-style "bg=#1E1E2E,fg=#CDD6F4"
set -g message-style "bg=#313244,fg=#CDD6F4"
set -g status-left-length 20
set -g status-right-length 0


# Window list styling
set-window-option -g window-status-style "bg=#313244,fg=#CDD6F4"
set-window-option -g window-status-format " #I:#W "

# Active window: blue bg, bold, base fg
set-window-option -g window-status-current-style "bg=#89B4FA,fg=#1E1E2E,bold"
set-window-option -g window-status-current-format " #[bold]#I:#W* "

# Optional: bell/alert window styling
set-window-option -g window-status-bell-style "bg=#F38BA8,fg=#1E1E2E,bold"

# Left and right status
set -g status-left "#[bg=#89B4FA,fg=#1E1E2E,bold] #S #[default]"
set -g status-right ""
